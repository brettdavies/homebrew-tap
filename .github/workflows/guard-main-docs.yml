# Tap repo guard-main-docs wrapper — calls the centralized reusable workflow.
#
# Blocks compound-engineering docs (plans, solutions, brainstorms, reviews)
# from being merged into main. Only needs pull-requests: read.
name: Guard main from engineering docs

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: read

jobs:
  guard-docs:
    uses: brettdavies/.github/.github/workflows/guard-main-docs.yml@main
    with:
      # Repo-specific dev-only files: keep `.gitignore` (developer-local
      # `docs/solutions` symlink) and `.markdownlint-cli2.yaml` (project
      # markdownlint config that mirrors the global) out of release PRs.
      # Exact filename matches; the reusable also enforces the hardcoded
      # base list (docs/plans, docs/brainstorms, etc.).
      extra_paths: '.gitignore,.markdownlint-cli2.yaml'
