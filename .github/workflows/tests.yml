name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ubuntu-22.04-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ubuntu-22.04-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

  detect:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    outputs:
      formulas_changed: ${{ steps.check.outputs.formulas_changed }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check for formula changes
        id: check
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });
            const changed = files.some(f => f.filename.startsWith('Formula/'));
            core.setOutput('formulas_changed', String(changed));
            core.info(`Formula changes detected: ${changed}`);

  bottles:
    if: needs.detect.outputs.formulas_changed == 'true'
    needs: [lint, detect]
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      # Compute the bottle's `root_url` from the auto-generated update
      # branch pattern `update/<formula>/v<version>` so bottles are tagged
      # at creation time with the source repo's release URL.
      #
      # Why this lives on test-bot, not pr-pull:
      # brew test-bot --only-formulae writes `root_url` into the bottle's
      # *.bottle.json artifact via `brew bottle --root-url=…`. Later stages
      # (`brew bottle --merge --write`, `brew pr-upload`, `brew pr-pull`)
      # re-read root_url FROM the JSON — `--root-url` on those commands is
      # used for upload-destination routing only, not for rewriting the
      # formula. Without this flag here, test-bot falls back to a
      # tap-repo default (`<tap>/releases/download/<formula>-<version>`)
      # that doesn't exist, and the formula's bottle block points at a 404.
      # Refs: Homebrew/homebrew-test-bot lib/tests/formulae.rb
      #       Homebrew/brew Library/Homebrew/dev-cmd/bottle.rb (merge path)
      - name: Compute bottle root URL flag
        id: root_url
        env:
          # Avoid inline `${{ github.event.pull_request.head.ref }}` in shell —
          # actionlint flags that as a script-injection risk because PR head refs
          # from forks are attacker-controllable. Pass through env instead and let
          # the regex validate before interpolation.
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          FLAG=""
          if [[ "$HEAD_REF" =~ ^update/([a-zA-Z0-9_-]+)/(v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            FORMULA="${BASH_REMATCH[1]}"
            VERSION="${BASH_REMATCH[2]}"
            FLAG="--root-url=https://github.com/brettdavies/${FORMULA}/releases/download/${VERSION}"
          fi
          echo "flag=$FLAG" >> "$GITHUB_OUTPUT"

      - run: brew test-bot --only-formulae ${{ steps.root_url.outputs.flag }}

      - name: Upload bottles as artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: bottles_${{ matrix.os }}
          path: '*.bottle.*'
