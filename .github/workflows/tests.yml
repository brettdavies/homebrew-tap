name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ubuntu-22.04-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ubuntu-22.04-rubygems-

      - run: brew test-bot --only-cleanup-before

      # `brew doctor` (invoked by `--only-setup`) now warns about untrusted
      # third-party taps (Homebrew/brew#22470). Under `HOMEBREW_DEVELOPER`,
      # which test-bot sets, that warning is fatal. Trusting at the tap
      # level covers every formula in this tap, present and future.
      - run: brew trust --tap brettdavies/tap

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

  detect:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    outputs:
      # Comma-separated, tap-qualified testing formulae (e.g.
      # "brettdavies/tap/xurl-rs,brettdavies/tap/bird"). `brew test-bot
      # --testing-formulae=` is a comma_array (see
      # Library/Homebrew/dev-cmd/test-bot.rb). Excludes any formula
      # pre-seeded with v0.0.0 placeholder — those have no real tarball yet so
      # `brew test-bot --only-formulae` would 404 on fetch. See the solutions
      # note: integration-issues/homebrew-tap-automated-formula-updates-via-dispatch.md
      testing_formulae: ${{ steps.check.outputs.testing_formulae }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Detect testable formulas (exclude v0.0.0 pre-seeds)
        id: check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });
            const formulaFiles = files
              .filter(f => f.filename.startsWith('Formula/') && f.filename.endsWith('.rb'))
              .filter(f => f.status !== 'removed');
            core.info(`Changed formula files: ${formulaFiles.map(f => f.filename).join(', ') || '(none)'}`);

            // Tap prefix for `brew test-bot --testing-formulae`. Hardcoded to
            // this tap's slug — the workflow only runs in this repo.
            const tapPrefix = 'brettdavies/tap/';
            // Pre-seed marker: formulas created via the v0.0.0 placeholder
            // pattern point at a tag tarball that does not exist. Matches the
            // canonical pre-seed line so bumps to real versions are tested.
            const preseedRegex = /url\s+"https:\/\/github\.com\/[^"]+\/archive\/refs\/tags\/v0\.0\.0\.tar\.gz"/;

            const headSha = context.payload.pull_request.head.sha;
            const headRepo = context.payload.pull_request.head.repo;
            // `head.repo` is null when the fork was deleted; fall back to the
            // base repo so the API call still resolves (the PR won't be
            // mergeable anyway, but we shouldn't crash).
            const owner = headRepo ? headRepo.owner.login : context.repo.owner;
            const repo = headRepo ? headRepo.name : context.repo.repo;

            const testable = [];
            for (const f of formulaFiles) {
              const { data } = await github.rest.repos.getContent({
                owner, repo, path: f.filename, ref: headSha,
              });
              const content = Buffer.from(data.content, data.encoding).toString('utf8');
              const name = f.filename.replace(/^Formula\//, '').replace(/\.rb$/, '');
              if (preseedRegex.test(content)) {
                core.info(`Skipping ${name}: v0.0.0 pre-seed placeholder (no real tarball yet).`);
                continue;
              }
              testable.push(`${tapPrefix}${name}`);
            }

            // Comma-separated per `brew test-bot --testing-formulae=` parser.
            const list = testable.join(',');
            core.setOutput('testing_formulae', list);
            core.info(`Testing formulae: ${list || '(none — bottles job will be skipped)'}`);

  bottles:
    if: needs.detect.outputs.testing_formulae != ''
    needs: [lint, detect]
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew trust --tap brettdavies/tap

      - run: brew test-bot --only-setup

      # Compute the bottle's `root_url` from the auto-generated update
      # branch pattern `update/<formula>/v<version>` so bottles are tagged
      # at creation time with the source repo's release URL.
      #
      # Why this lives on test-bot, not pr-pull:
      # brew test-bot --only-formulae writes `root_url` into the bottle's
      # *.bottle.json artifact via `brew bottle --root-url=…`. Later stages
      # (`brew bottle --merge --write`, `brew pr-upload`, `brew pr-pull`)
      # re-read root_url FROM the JSON — `--root-url` on those commands is
      # used for upload-destination routing only, not for rewriting the
      # formula. Without this flag here, test-bot falls back to a
      # tap-repo default (`<tap>/releases/download/<formula>-<version>`)
      # that doesn't exist, and the formula's bottle block points at a 404.
      # Refs: Homebrew/homebrew-test-bot lib/tests/formulae.rb
      #       Homebrew/brew Library/Homebrew/dev-cmd/bottle.rb (merge path)
      - name: Compute bottle root URL flag
        id: root_url
        env:
          # Avoid inline `${{ github.event.pull_request.head.ref }}` in shell —
          # actionlint flags that as a script-injection risk because PR head refs
          # from forks are attacker-controllable. Pass through env instead and let
          # the regex validate before interpolation.
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          FLAG=""
          if [[ "$HEAD_REF" =~ ^update/([a-zA-Z0-9_-]+)/(v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            FORMULA="${BASH_REMATCH[1]}"
            VERSION="${BASH_REMATCH[2]}"
            # Formula name is not always the GitHub repo slug (e.g. formula
            # `agentnative`, repo `brettdavies/agentnative-cli`). Parse the
            # authoritative `owner/repo` out of the formula's own `url`
            # field so the bottle's frozen JSON root_url points at the real
            # release assets path. `--root-url` on downstream commands
            # (`pr-upload`, `pr-pull`) is upload-routing only and can't
            # retroactively fix this field once it's baked into the JSON.
            # HEAD_REF is validated by the regex above so FORMULA is safe
            # to interpolate into the path.
            REPO=$(sed -nE 's|^  url "https://github\.com/([^/]+/[^/]+)/archive/.*|\1|p' \
              "Formula/${FORMULA}.rb" | head -n1)
            if [ -z "$REPO" ]; then
              echo "::error::Could not parse owner/repo from Formula/${FORMULA}.rb url field"
              exit 1
            fi
            FLAG="--root-url=https://github.com/${REPO}/releases/download/${VERSION}"
          fi
          echo "flag=$FLAG" >> "$GITHUB_OUTPUT"

      # `--testing-formulae` is sourced from `detect` (v0.0.0 pre-seeds already
      # excluded), so test-bot skips git-diff auto-discovery and only tests
      # formulas with a real upstream tarball.
      - env:
          TESTING_FORMULAE: ${{ needs.detect.outputs.testing_formulae }}
        run: brew test-bot --only-formulae --testing-formulae="$TESTING_FORMULAE" ${{ steps.root_url.outputs.flag }}

      - name: Upload bottles as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bottles_${{ matrix.os }}
          path: '*.bottle.*'
